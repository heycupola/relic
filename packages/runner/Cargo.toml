[package]
name = "relic-runner"
description = "Secret injection and process runner for Relic CLI."
authors = ["Can Vardar <https://github.com/heycupola/relic>"]
version = "0.1.0"
edition = "2021"

[dependencies]
libc = "0.2.182"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
zeroize = "1.8.2"

[lib]
crate-type = ["cdylib"]
