[package]
name = "relic-runner"
description = "The Relic runner for injecting secrets into local processes. Encrypted on your device, never exposed to anyone else. Not even us."
authors = ["Can Vardar <https://github.com/heycupola/relic>"]
version = "0.1.0"
edition = "2021"
license = "MIT"

[dependencies]
libc = "0.2.182"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
zeroize = "1.8.2"

[lib]
crate-type = ["cdylib"]
