name: Release

on:
  push:
    branches: [main]
    paths:
      - 'apps/cli/**'
      - 'packages/runner/**'
  workflow_dispatch:

jobs:
  check-version:
    name: Check Version Change
    runs-on: ubuntu-latest
    outputs:
      version-changed: ${{ steps.check.outputs.changed }}
      new-version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check
        run: |
          CURRENT=$(node -p "require('./apps/cli/package.json').version")
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger — skipping version comparison"
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          git checkout HEAD~1 -- apps/cli/package.json 2>/dev/null || true
          PREVIOUS=$(node -p "require('./apps/cli/package.json').version" 2>/dev/null || echo "0.0.0")
          git checkout HEAD -- apps/cli/package.json

          echo "Previous: $PREVIOUS → Current: $CURRENT"

          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  build-rust:
    name: Build Rust (${{ matrix.platform }})
    needs: check-version
    if: needs.check-version.outputs.version-changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin-arm64
            target: aarch64-apple-darwin
          - os: macos-latest
            platform: darwin-x64
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            platform: linux-x64
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            platform: win32-x64
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/runner/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Rust library
        working-directory: packages/runner
        run: cargo build --release --target ${{ matrix.target }}

      - name: Collect artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts
          cp packages/runner/target/${{ matrix.target }}/release/librelic_runner.* artifacts/

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p artifacts
          cp packages/runner/target/${{ matrix.target }}/release/relic_runner.dll artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-${{ matrix.platform }}
          path: artifacts/
          if-no-files-found: error

  build-cli:
    name: Build CLI (${{ matrix.platform }})
    needs: [check-version, build-rust]
    if: needs.check-version.outputs.version-changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin-arm64
            target: bun-darwin-arm64
            binary: relic
          - os: macos-latest
            platform: darwin-x64
            target: bun-darwin-x64
            binary: relic
          - os: ubuntu-latest
            platform: linux-x64
            target: bun-linux-x64
            binary: relic
          - os: windows-latest
            platform: win32-x64
            target: bun-windows-x64
            binary: relic.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Rust artifact
        uses: actions/download-artifact@v4
        with:
          name: rust-${{ matrix.platform }}
          path: apps/cli/prebuilds/${{ matrix.platform }}

      - name: Bundle CLI with patched OpenTUI resolution
        working-directory: apps/cli
        run: bun run build

      - name: Download OpenTUI native lib (Unix)
        if: runner.os != 'Windows'
        run: |
          npm pack @opentui/core-${{ matrix.platform }}@0.1.88
          tar xzf opentui-core-*.tgz
          mkdir -p opentui-lib
          cp package/libopentui.* opentui-lib/ 2>/dev/null || true

      - name: Download OpenTUI native lib (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          npm pack @opentui/core-${{ matrix.platform }}@0.1.88
          $tgz = Get-ChildItem -Filter "opentui-core-*.tgz" | Select-Object -First 1
          tar xzf $tgz.Name
          New-Item -ItemType Directory -Force -Path opentui-lib
          Copy-Item "package/opentui.*" -Destination opentui-lib/ -ErrorAction SilentlyContinue

      - name: Build standalone binary
        run: bun build --compile --target=${{ matrix.target }} apps/cli/dist/cli.js --outfile dist/${{ matrix.binary }}

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp dist/${{ matrix.binary }} staging/
          cp apps/cli/prebuilds/${{ matrix.platform }}/librelic_runner.* staging/
          cp opentui-lib/libopentui.* staging/ 2>/dev/null || true
          tar -czf dist/relic-${{ matrix.platform }}.tar.gz -C staging .

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "dist/${{ matrix.binary }}" -Destination staging/
          Copy-Item "apps/cli/prebuilds/${{ matrix.platform }}/relic_runner.dll" -Destination staging/
          Copy-Item "opentui-lib/opentui.*" -Destination staging/ -ErrorAction SilentlyContinue
          Compress-Archive -Path staging/* -DestinationPath "dist/relic-${{ matrix.platform }}.zip"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.platform }}
          path: dist/relic-${{ matrix.platform }}.*
          if-no-files-found: error

      - name: Upload raw binary for npm
        uses: actions/upload-artifact@v4
        with:
          name: cli-bin-${{ matrix.platform }}
          path: |
            dist/${{ matrix.binary }}
            apps/cli/prebuilds/${{ matrix.platform }}/
            opentui-lib/
          if-no-files-found: error

  release:
    name: Publish & Release
    needs: [check-version, build-rust, build-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      sha_darwin_arm64: ${{ steps.homebrew_shas.outputs.sha_darwin_arm64 }}
      sha_darwin_x64: ${{ steps.homebrew_shas.outputs.sha_darwin_x64 }}
      sha_linux_x64: ${{ steps.homebrew_shas.outputs.sha_linux_x64 }}
    env:
      VERSION: ${{ needs.check-version.outputs.new-version }}

    steps:
      - uses: actions/checkout@v5

      - name: Download CLI archives
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: artifacts
          merge-multiple: false

      - name: Collect release archives
        run: |
          mkdir -p dist
          for platform in darwin-arm64 darwin-x64 linux-x64 win32-x64; do
            cp artifacts/cli-$platform/relic-$platform.* dist/ 2>/dev/null || true
          done

      - name: Compute Homebrew tap checksums
        id: homebrew_shas
        run: |
          echo "sha_darwin_arm64=$(sha256sum dist/relic-darwin-arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha_darwin_x64=$(sha256sum dist/relic-darwin-x64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha_linux_x64=$(sha256sum dist/relic-linux-x64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Populate npm platform packages
        run: |
          for platform in darwin-arm64 darwin-x64 linux-x64; do
            mkdir -p npm/$platform/bin
            cp artifacts/cli-bin-$platform/dist/relic npm/$platform/bin/relic
            cp artifacts/cli-bin-$platform/apps/cli/prebuilds/$platform/librelic_runner.* npm/$platform/bin/
            cp artifacts/cli-bin-$platform/opentui-lib/libopentui.* npm/$platform/bin/ 2>/dev/null || true
            chmod +x npm/$platform/bin/relic
          done

          mkdir -p npm/win32-x64/bin
          cp artifacts/cli-bin-win32-x64/dist/relic.exe npm/win32-x64/bin/relic.exe
          cp artifacts/cli-bin-win32-x64/apps/cli/prebuilds/win32-x64/relic_runner.dll npm/win32-x64/bin/
          cp artifacts/cli-bin-win32-x64/opentui-lib/opentui.* npm/win32-x64/bin/ 2>/dev/null || true

      - name: Extract changelog for release body
        id: changelog
        run: |
          BODY=""
          if [ -f "apps/cli/CHANGELOG.md" ]; then
            BODY=$(node -e "
              const fs = require('fs');
              const v = process.argv[1].replace(/\./g, '\\\\.');
              const c = fs.readFileSync('apps/cli/CHANGELOG.md', 'utf8');
              const m = c.match(new RegExp('## ' + v + '\\\\n([\\\\s\\\\S]*?)(?=\\\\n## |$)'));
              process.stdout.write(m ? m[1].trim() : '');
            " "$VERSION")
          fi

          if [ -z "$BODY" ]; then
            BODY="Release v${VERSION}"
          fi

          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          files: |
            dist/relic-darwin-arm64.tar.gz
            dist/relic-darwin-x64.tar.gz
            dist/relic-linux-x64.tar.gz
            dist/relic-win32-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync npm package versions
        run: |
          node -e "
            const fs = require('fs');
            const version = '${VERSION}';
            const packages = [
              'npm/darwin-arm64/package.json',
              'npm/darwin-x64/package.json',
              'npm/linux-x64/package.json',
              'npm/win32-x64/package.json',
              'npm/relic/package.json',
            ];
            for (const p of packages) {
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              pkg.version = version;
              if (pkg.optionalDependencies) {
                for (const dep of Object.keys(pkg.optionalDependencies)) {
                  if (dep.startsWith('relic-cli-')) {
                    pkg.optionalDependencies[dep] = version;
                  }
                }
              }
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
            }
          "

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Publish platform packages to npm
        run: |
          for platform in darwin-arm64 darwin-x64 linux-x64 win32-x64; do
            echo "Publishing relic-cli-$platform..."
            (cd npm/$platform && npm publish --access public --provenance) || echo "Skipped relic-cli-$platform (already published or error)"
          done

      - name: Publish relic package to npm
        run: |
          cd npm/relic
          npm publish --access public --provenance

  sync-changelog:
    name: Sync Changelog Content
    needs: [check-version, release]
    if: needs.check-version.outputs.version-changed == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: sync-changelog
      cancel-in-progress: false
    permissions:
      contents: write
    env:
      TARGET_BRANCH: main
      EXPECTED_RELEASE_TAG: v${{ needs.check-version.outputs.new-version }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_BRANCH }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate changelog content from releases
        working-directory: apps/web
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EXPECTED_RELEASE_TAG: ${{ env.EXPECTED_RELEASE_TAG }}
        run: bun run sync:changelog

      - name: Commit generated changelog content
        run: |
          if git diff --quiet -- apps/web/content/changelog/generated; then
            echo "No changelog updates to commit."
            exit 0
          fi

          git add apps/web/content/changelog/generated
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            commit -m "chore: sync changelog from GitHub releases"
          git fetch origin "$TARGET_BRANCH"
          git rebase "origin/$TARGET_BRANCH"
          git push origin HEAD:"$TARGET_BRANCH"

  update-homebrew-tap:
    name: Update Homebrew Tap
    needs: [check-version, release]
    if: needs.check-version.outputs.version-changed == 'true'
    uses: ./.github/workflows/update-homebrew-tap.yml
    with:
      version: ${{ needs.check-version.outputs.new-version }}
      sha_darwin_arm64: ${{ needs.release.outputs.sha_darwin_arm64 }}
      sha_darwin_x64: ${{ needs.release.outputs.sha_darwin_x64 }}
      sha_linux_x64: ${{ needs.release.outputs.sha_linux_x64 }}
    secrets:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
