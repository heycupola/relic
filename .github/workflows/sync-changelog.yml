name: Sync Changelog

on:
  release:
    types: [published, edited]
  workflow_dispatch:

concurrency:
  group: sync-changelog
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate changelog content from releases
        working-directory: apps/web
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bun run sync:changelog

      - name: Commit generated changelog content
        run: |
          if git diff --quiet -- apps/web/content/changelog/generated; then
            echo "No changelog updates to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/content/changelog/generated
          git commit -m "chore: sync changelog from GitHub releases"
          git fetch origin "$DEFAULT_BRANCH"
          git rebase "origin/$DEFAULT_BRANCH"
          git push origin HEAD:"$DEFAULT_BRANCH"
