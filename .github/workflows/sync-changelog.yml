name: Sync Changelog

on:
  release:
    types: [published, edited]
  workflow_dispatch:

concurrency:
  group: sync-changelog
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TARGET_BRANCH: main
      EXPECTED_RELEASE_TAG: ${{ github.event.release.tag_name || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_BRANCH }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate changelog content from releases
        working-directory: apps/web
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EXPECTED_RELEASE_TAG: ${{ env.EXPECTED_RELEASE_TAG }}
        run: bun run sync:changelog

      - name: Commit generated changelog content
        run: |
          if git diff --quiet -- apps/web/content/changelog/generated; then
            echo "No changelog updates to commit."
            exit 0
          fi

          git add apps/web/content/changelog/generated
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            commit -m "chore: sync changelog from GitHub releases"
          git fetch origin "$TARGET_BRANCH"
          git rebase "origin/$TARGET_BRANCH"
          git push origin HEAD:"$TARGET_BRANCH"
