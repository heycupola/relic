name: CI

on:
  push:
    branches:
      - main
      - canary
  pull_request:
    branches:
      - main
      - canary

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome lint
        run: bunx turbo run lint --filter='!@repo/runner'

      - name: Run Biome format check
        run: bunx turbo run format --filter='!@repo/runner'

      - name: Type check
        run: bunx turbo run check-types --filter='!@repo/runner'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bunx turbo run build --filter='!@repo/runner'
        env:
          NEXT_PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
